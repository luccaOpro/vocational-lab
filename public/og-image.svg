<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph image · 1200×630 — preview que aparece cuando se
  comparte un link de Vocational Lab en WhatsApp, Facebook,
  Twitter, LinkedIn, etc.
  ---
  Contiene: logo oficial centrado sobre fondo crema con un
  acento sutil arriba a la derecha, y debajo del logo el tagline.

  ⚠️ Para máxima compatibilidad (sobre todo WhatsApp), convertir
  este SVG a PNG 1200×630 con un tool tipo cloudconvert.com y
  guardarlo como og-image.png. Después actualizar Layout.astro
  para que apunte a .png.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .og-cls-1 { fill: #1b1f3b; }
      .og-cls-2 { fill: #d85527; }
      .og-text-vocacional {
        font-family: 'Fraunces 72pt SuperSoft', 'Fraunces', Georgia, serif;
        font-size: 86px;
        fill: #1b1f3b;
      }
      .og-text-lab {
        font-family: 'Fraunces', Georgia, serif;
        font-weight: 700;
        font-size: 86px;
        fill: #1b1f3b;
      }
      .og-tagline {
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-size: 28px;
        fill: #5a5e75;
        letter-spacing: 0.04em;
      }
    </style>
  </defs>

  <!-- Fondo crema (color de marca del sitio) -->
  <rect width="1200" height="630" fill="#faf7f2"/>

